spring.application.name=Heardly

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.thymeleaf.check-template-location=false

otterfree.storage.audio-dir=${user.home}/otterfree/audio
otterfree.whisper.base-url=http://localhost:9000

otterfree.recall.base-url=https://us-west-2.recall.ai/api/v1
otterfree.recall.api-key=a4bb3cb6053f084804c0d0161817ae46c63a77a3
otterfree.recall.default-bot-name=Heardly Notetaker
otterfree.recall.poll-interval-ms=30000

otterfree.openai.base-url=https://api.openai.com/v1
otterfree.openai.api-key=${OPENAI_API_KEY:}
otterfree.openai.model=gpt-4o-mini

spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Base URL used when building shareable links inside Slack / email summaries.
otterfree.base-url=${OTTERFREE_BASE_URL:http://localhost:8080}

# Gmail / SMTP for the Email (Gmail) integration. The integration is disabled
# automatically unless spring.mail.host is set. For Gmail, use an App Password
# (https://myaccount.google.com/apppasswords), NOT your normal account password.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:charanisigntech@gmail.com}
spring.mail.password=${MAIL_PASSWORD:bzfyxrjxkcqpgoww}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
otterfree.mail.from=${MAIL_FROM:${MAIL_USERNAME:charanisigntech@gmail.com}}

spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.cache=false
