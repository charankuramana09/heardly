<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — Heardly</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">H</span>
      <span class="auth-brand-text">Heardly</span>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to access your transcripts</p>

    <div th:if="${param.error}" class="alert error">
      <svg class="alert-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>Invalid email or password. Please try again.</span>
    </div>
    <div th:if="${param.logout}" class="alert info">
      <svg class="alert-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>You have been logged out.</span>
    </div>

    <form method="post" th:action="@{/login}">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="username"
               autocomplete="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password"
               autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a th:href="@{/signup}">Sign up</a>
    </p>
  </div>
</div>
</body>
</html>
