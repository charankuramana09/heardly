<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ask Heardly — Heardly</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: menuToggle}"></div>
<div th:replace="~{fragments/sidebar :: backdrop}"></div>

<div class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar('chat', ${currentUser})}"></div>

  <main class="main">
    <div class="main-inner">
      <div class="page-header">
        <h1>Ask Heardly</h1>
        <p class="subtitle">Ask anything about all your recordings. Heardly searches across every meeting you've recorded.</p>
      </div>

      <div th:if="${!chatEnabled}" class="info-card">
        <svg class="info-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="12" y1="18" x2="12.01" y2="18"/>
        </svg>
        <div class="info-card-body">
          <h3>AI Chat is disabled</h3>
          <p>Set the OPENAI_API_KEY environment variable to enable Ask Heardly.</p>
        </div>
      </div>

      <section th:if="${chatEnabled}" class="chat-section"
               data-chat-endpoint="/api/chat"
               data-chat-clear-endpoint="/api/chat">

        <div class="insights-header" th:if="${not #lists.isEmpty(globalChatHistory)}">
          <span></span>
          <button class="btn btn-ghost btn-sm clear-chat-btn" type="button">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/>
            </svg>
            Clear conversation
          </button>
        </div>

        <div class="chat-card chat-card-tall">
          <div class="chat-messages">
            <div th:if="${#lists.isEmpty(globalChatHistory)}" class="chat-empty">
              <p style="font-size: 14px; color: var(--text); margin-bottom: 6px;"><strong>Try one of these to get started:</strong></p>
              <p>Examples of questions you can ask across all your meetings:</p>
              <div class="chat-suggestions chat-suggestions-stacked">
                <button type="button" class="chat-suggestion"
                        data-q="Give me a breakdown of the time spent on different agenda items in my last client meeting.">
                  📊 Time spent on agenda items in my last client meeting
                </button>
                <button type="button" class="chat-suggestion"
                        data-q="What were the major decisions made during my meetings this morning?">
                  ✅ Major decisions made during my meetings this morning
                </button>
                <button type="button" class="chat-suggestion"
                        data-q="Tell me about any important deadlines discussed in my meetings last week.">
                  ⏰ Important deadlines discussed last week
                </button>
                <button type="button" class="chat-suggestion"
                        data-q="What are all my pending action items, and who owns each?">
                  📝 All pending action items + who owns each
                </button>
                <button type="button" class="chat-suggestion"
                        data-q="Summarize the most important takeaways from my last 3 recordings.">
                  💡 Most important takeaways from my last 3 recordings
                </button>
                <button type="button" class="chat-suggestion"
                        data-q="What topics came up most often across my recent meetings?">
                  🔁 Topics that came up most often recently
                </button>
              </div>
            </div>
            <div th:each="m : ${globalChatHistory}" class="chat-msg"
                 th:classappend="'chat-msg-' + ${#strings.toLowerCase(m.role.name())}">
              <div class="chat-bubble" th:text="${m.content}">msg</div>
            </div>
          </div>
          <form class="chat-form" autocomplete="off">
            <input type="text" class="chat-input" placeholder="Ask anything about all your recordings…" required>
            <button type="submit" class="btn btn-primary btn-sm chat-send">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
              Ask
            </button>
          </form>
        </div>
      </section>
    </div>
  </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
