<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<svg th:fragment="favicon" xmlns="http://www.w3.org/2000/svg">
  <!-- placeholder so Thymeleaf renders this file without error -->
</svg>

<th:block th:fragment="head">
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="alternate icon" type="image/png" th:href="@{/favicon.png}">
  <link rel="apple-touch-icon" th:href="@{/favicon.svg}">
</th:block>

<aside th:fragment="sidebar(active, currentUser)" class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-mark">H</span>
    <span class="brand-text">Heardly</span>
  </div>

  <div class="sidebar-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="globalSearch" type="text" placeholder="Search recordings…" autocomplete="off">
  </div>

  <div class="sidebar-section-label">Workspace</div>
  <nav class="sidebar-nav">
    <a th:href="@{/}" class="nav-item" th:classappend="${active == 'recordings' ? 'active' : ''}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      <span>All recordings</span>
    </a>
    <a th:href="@{/upload}" class="nav-item" th:classappend="${active == 'upload' ? 'active' : ''}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span>Upload recording</span>
    </a>
    <a th:href="@{/meetings/new}" class="nav-item" th:classappend="${active == 'schedule' ? 'active' : ''}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"/>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      <span>Bot for meeting</span>
    </a>
    <a th:href="@{/chat}" class="nav-item" th:classappend="${active == 'chat' ? 'active' : ''}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Ask Heardly</span>
    </a>
    <a th:href="@{/integrations}" class="nav-item" th:classappend="${active == 'integrations' ? 'active' : ''}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>Integrations</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-block">
      <span class="user-avatar" th:text="${#strings.substring(currentUser, 0, 1)}">U</span>
      <div class="user-info">
        <div class="user-label">Signed in as</div>
        <div class="user-email" th:text="${currentUser}">user@example.com</div>
      </div>
    </div>
    <form th:action="@{/logout}" method="post" style="margin: 0">
      <button type="submit" class="logout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </form>
  </div>
</aside>

<button th:fragment="menuToggle" class="menu-toggle" type="button" onclick="document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarBackdrop').classList.toggle('show');">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<div th:fragment="backdrop" class="sidebar-backdrop" id="sidebarBackdrop" onclick="document.getElementById('sidebar').classList.remove('open'); this.classList.remove('show');"></div>

</body>
</html>
