<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign up — Heardly</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">H</span>
      <span class="auth-brand-text">Heardly</span>
    </div>
    <h1>Create your account</h1>
    <p class="subtitle">Free, local meeting transcription</p>

    <div th:if="${error}" class="alert error">
      <svg class="alert-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span th:text="${error}">err</span>
    </div>

    <form method="post" th:action="@{/signup}">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" th:value="${email}"
               autocomplete="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Display name <span class="muted">(optional)</span></label>
        <input class="form-input" type="text" name="displayName" th:value="${displayName}"
               autocomplete="name" placeholder="Jane Doe" maxlength="128">
      </div>
      <div class="form-group">
        <label class="form-label">Password <span class="muted">(min 8 characters)</span></label>
        <input class="form-input" type="password" name="password"
               autocomplete="new-password" placeholder="••••••••" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a th:href="@{/login}">Log in</a>
    </p>
  </div>
</div>
</body>
</html>
